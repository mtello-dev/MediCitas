<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial Médico - MediCitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="inicio.html">MediCitas</a>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
            Cerrar sesión
        </button>
    </div>
</nav>

<div class="container py-5">
    <h2 class="fw-bold mb-4">Historial Médico</h2>

    <div id="alerta"></div>

    <div class="d-flex justify-content-between mb-3">
        <input type="text" id="buscador" class="form-control w-50" placeholder="Buscar historial...">
        <a href="historial-registrar.html" class="btn btn-success">Nuevo historial</a>
    </div>

    <table class="table table-bordered table-striped bg-white shadow-sm">
        <thead class="table-primary">
            <tr>
                <th>ID</th>
                <th>Paciente</th>
                <th>Diagnóstico</th>
                <th>Tratamiento</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaHistorial"></tbody>
    </table>
</div>

<script>
const API = 'http://localhost:3000/api/historial';
const token = sessionStorage.getItem('token');

if (!token) {
    window.location.href = 'login.html';
}

let historiales = [];

function cargarHistorial() {
    fetch(API, {
        headers: {
            Authorization: `Bearer ${token}`
        }
    })
    .then(res => validarSesion(res))
    .then(data => {
        historiales = data || [];
        mostrarHistorial(historiales);
    })
    .catch(() => {
        mostrarAlerta('Error al cargar el historial médico', 'danger');
    });
}

function mostrarHistorial(lista) {
    const tabla = document.getElementById('tablaHistorial');
    tabla.innerHTML = '';

    if (lista.length === 0) {
        tabla.innerHTML = `
            <tr>
                <td colspan="6" class="text-center text-muted">
                    No hay registros de historial médico
                </td>
            </tr>
        `;
        return;
    }

    lista.forEach(historial => {
        tabla.innerHTML += `
            <tr>
                <td>${historial.id}</td>
                <td>${historial.paciente || historial.usuario_id}</td>
                <td>${historial.diagnostico}</td>
                <td>${historial.tratamiento}</td>
                <td>${historial.fecha}</td>
                <td>
                    <a href="historial-editar.html?id=${historial.id}" class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <button onclick="eliminarHistorial(${historial.id})" class="btn btn-danger btn-sm">
                        Eliminar
                    </button>
                </td>
            </tr>
        `;
    });
}

function eliminarHistorial(id) {
    if (!confirm('¿Seguro que deseas eliminar este historial médico?')) {
        return;
    }

    fetch(`${API}/${id}`, {
        method: 'DELETE',
        headers: {
            Authorization: `Bearer ${token}`
        }
    })
    .then(res => validarSesion(res))
    .then(() => {
        mostrarAlerta('Historial médico eliminado correctamente', 'success');
        cargarHistorial();
    })
    .catch(() => {
        mostrarAlerta('Error al eliminar el historial médico', 'danger');
    });
}

document.getElementById('buscador').addEventListener('input', e => {
    const texto = e.target.value.toLowerCase();

    const filtrados = historiales.filter(historial =>
        String(historial.paciente || '').toLowerCase().includes(texto) ||
        String(historial.usuario_id || '').toLowerCase().includes(texto) ||
        String(historial.diagnostico || '').toLowerCase().includes(texto) ||
        String(historial.tratamiento || '').toLowerCase().includes(texto) ||
        String(historial.fecha || '').toLowerCase().includes(texto)
    );

    mostrarHistorial(filtrados);
});

function validarSesion(res) {
    if (res.status === 401 || res.status === 403) {
        sessionStorage.clear();
        window.location.href = 'login.html';
        return;
    }

    return res.json();
}

function mostrarAlerta(mensaje, tipo) {
    document.getElementById('alerta').innerHTML = `
        <div class="alert alert-${tipo} alert-dismissible fade show">
            ${mensaje}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;
}

function cerrarSesion() {
    sessionStorage.clear();
    window.location.href = 'login.html';
}

cargarHistorial();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

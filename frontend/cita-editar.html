<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Cita - MediCitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="inicio.html">MediCitas</a>
            <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">

                <h2 class="fw-bold mb-4">Editar Cita</h2>

                <div id="alerta"></div>

                <div class="card shadow-sm">
                    <div class="card-body p-4">

                        <form onsubmit="event.preventDefault(); actualizarCita();">

                            <div class="mb-3">
                                <label class="form-label">ID del paciente</label>
                                <input type="number" id="usuario_id" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">ID del doctor</label>
                                <input type="number" id="doctor_id" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Fecha</label>
                                <input type="date" id="fecha" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Hora</label>
                                <input type="time" id="hora" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Motivo de consulta</label>
                                <textarea id="motivo" class="form-control" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <select id="estado" class="form-select">
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="Confirmada">Confirmada</option>
                                    <option value="Cancelada">Cancelada</option>
                                </select>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="citas.html" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-warning" id="btnGuardar">
                                    Actualizar
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api/citas';
        const token = sessionStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) {
            window.location.href = 'citas.html';
        }

        function cargarCita() {
            fetch(`${API}/${id}`, {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            })
                .then(res => validarSesion(res))
                .then(cita => {
                    if (!cita) return;

                    document.getElementById('usuario_id').value = cita.usuario_id || '';
                    document.getElementById('doctor_id').value = cita.doctor_id || '';

                    if (cita.fecha) {
                        document.getElementById('fecha').value = cita.fecha.substring(0, 10);
                    }

                    if (cita.hora) {
                        document.getElementById('hora').value = cita.hora.substring(0, 5);
                    }

                    document.getElementById('motivo').value = cita.motivo || '';
                    document.getElementById('estado').value = cita.estado || 'Pendiente';
                })
                .catch(() => {
                    mostrarAlerta('Error al cargar la cita', 'danger');
                });
        }

        function actualizarCita() {
            const usuario_id = document.getElementById('usuario_id').value;
            const doctor_id = document.getElementById('doctor_id').value;
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            const motivo = document.getElementById('motivo').value.trim();
            const estado = document.getElementById('estado').value;
            const btn = document.getElementById('btnGuardar');

            if (!usuario_id || !doctor_id || !fecha || !hora) {
                mostrarAlerta('Paciente, doctor, fecha y hora son obligatorios', 'warning');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Actualizando...';

            fetch(`${API}/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${token}`
                },
                body: JSON.stringify({
                    usuario_id: Number(usuario_id),
                    doctor_id: Number(doctor_id),
                    fecha,
                    hora,
                    motivo,
                    estado
                })
            })
                .then(res => validarSesion(res))
                .then(data => {
                    if (!data) return;

                    if (data.error) {
                        mostrarAlerta(data.error, 'danger');
                        return;
                    }

                    mostrarAlerta('Cita actualizada correctamente', 'success');

                    setTimeout(() => {
                        window.location.href = 'citas.html';
                    }, 1200);
                })
                .catch(() => {
                    mostrarAlerta('Error al actualizar la cita', 'danger');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = 'Actualizar';
                });
        }

        function validarSesion(res) {
            if (res.status === 401 || res.status === 403) {
                sessionStorage.clear();
                window.location.href = 'login.html';
                return;
            }

            return res.json();
        }

        function mostrarAlerta(mensaje, tipo) {
            document.getElementById('alerta').innerHTML = `
        <div class="alert alert-${tipo} alert-dismissible fade show">
            ${mensaje}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;
        }

        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        cargarCita();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

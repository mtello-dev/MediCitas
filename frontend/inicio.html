<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inicio - MediCitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand fw-bold">MediCitas</span>

            <div class="d-flex align-items-center gap-3">
                <span class="text-white" id="nombreUsuario"></span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-5">

        <div id="alerta"></div>

        <div id="spinner" class="text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="text-muted mt-2">Cargando...</p>
        </div>

        <div id="contenido" class="d-none">

            <h2 id="tituloBienvenida" class="fw-bold"></h2>
            <p id="fechaHora" class="text-muted"></p>

            <div class="row g-3" id="tarjetasModulos"></div>

        </div>

    </div>

    <script src="js/inicio.js"></script>
</body>

</html>

<body>

    <div class="container py-5">

        <h1 class="mb-4">

            <div class="mb-4">

                <label class="form-label">
                    Motivo de consulta

                <textarea

            <button class="btn btn-dark">
                Confirmar Cita

        </div>

    </div>

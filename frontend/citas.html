<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Citas - MediCitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="inicio.html">MediCitas</a>
            <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">Citas</h2>

        <div id="alerta"></div>

        <div class="d-flex justify-content-between mb-3">
            <input type="text" id="buscador" class="form-control w-50" placeholder="Buscar cita...">
            <a href="cita-registrar.html" class="btn btn-success">Nueva cita</a>
        </div>

        <table class="table table-bordered table-striped bg-white shadow-sm">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Paciente</th>
                    <th>Doctor</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Motivo</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCitas"></tbody>
        </table>
    </div>

    <script>
        const API = 'http://localhost:3000/api/citas';
        const token = sessionStorage.getItem('token');

        if (!token) window.location.href = 'login.html';

        let citas = [];

        function cargarCitas() {
            fetch(API, {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            })
                .then(res => validarSesion(res))
                .then(data => {
                    citas = data || [];
                    mostrarCitas(citas);
                })
                .catch(() => mostrarAlerta('Error al cargar citas', 'danger'));
        }

        function mostrarCitas(lista) {
            const tabla = document.getElementById('tablaCitas');
            tabla.innerHTML = '';

            lista.forEach(cita => {
                tabla.innerHTML += `
            <tr>
                <td>${cita.id}</td>
                <td>${cita.paciente || cita.usuario_id}</td>
                <td>${cita.doctor || cita.doctor_id}</td>
                <td>${cita.fecha}</td>
                <td>${cita.hora}</td>
                <td>${cita.motivo || ''}</td>
                <td>${cita.estado}</td>
                <td>
                    <a href="cita-editar.html?id=${cita.id}" class="btn btn-warning btn-sm">Editar</a>
                    <button onclick="eliminarCita(${cita.id})" class="btn btn-danger btn-sm">Eliminar</button>
                </td>
            </tr>
        `;
            });
        }

        function eliminarCita(id) {
            if (!confirm('¿Seguro que deseas eliminar esta cita?')) return;

            fetch(`${API}/${id}`, {
                method: 'DELETE',
                headers: {
                    Authorization: `Bearer ${token}`
                }
            })
                .then(res => validarSesion(res))
                .then(() => {
                    mostrarAlerta('Cita eliminada correctamente', 'success');
                    cargarCitas();
                })
                .catch(() => mostrarAlerta('Error al eliminar cita', 'danger'));
        }

        document.getElementById('buscador').addEventListener('input', e => {
            const texto = e.target.value.toLowerCase();

            const filtrados = citas.filter(cita =>
                String(cita.paciente || '').toLowerCase().includes(texto) ||
                String(cita.doctor || '').toLowerCase().includes(texto) ||
                String(cita.estado || '').toLowerCase().includes(texto)
            );

            mostrarCitas(filtrados);
        });

        function validarSesion(res) {
            if (res.status === 401 || res.status === 403) {
                sessionStorage.clear();
                window.location.href = 'login.html';
                return;
            }
            return res.json();
        }

        function mostrarAlerta(mensaje, tipo) {
            document.getElementById('alerta').innerHTML = `
        <div class="alert alert-${tipo}">${mensaje}</div>
    `;
        }

        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        cargarCitas();
    </script>

</body>

</html>

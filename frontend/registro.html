<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - MediCitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <h2 class="text-center fw-bold">Crear Cuenta</h2>
            <p class="text-center text-muted">Completa tus datos</p>

            <div id="alerta"></div>

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <form onsubmit="event.preventDefault(); registro();">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="inputNombre" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="inputEmail" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="inputPassword" class="form-control">
                        </div>

                        <button class="btn btn-success w-100" id="btnRegistro">
                            Registrarme
                        </button>

                    </form>

                </div>
            </div>

            <p class="text-center mt-3">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </p>

        </div>
    </div>
</div>

<script src="js/registro.js"></script>
</body>
</html>

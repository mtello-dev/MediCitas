<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Especialidades - MediCitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="inicio.html">MediCitas</a>
            <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">Especialidades</h2>

        <div id="alerta"></div>

        <div class="d-flex justify-content-between mb-3">
            <input type="text" id="buscador" class="form-control w-50" placeholder="Buscar especialidad...">
            <a href="especialidad-registrar.html" class="btn btn-success">Nueva especialidad</a>
        </div>

        <table class="table table-bordered table-striped bg-white shadow-sm">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaEspecialidades"></tbody>
        </table>
    </div>

    <script>
        const API = 'http://localhost:3000/api/especialidades';
        const token = sessionStorage.getItem('token');

        if (!token) window.location.href = 'login.html';

        let especialidades = [];

        function cargarEspecialidades() {
            fetch(API, {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            })
                .then(res => validarSesion(res))
                .then(data => {
                    especialidades = data || [];
                    mostrarEspecialidades(especialidades);
                })
                .catch(() => mostrarAlerta('Error al cargar especialidades', 'danger'));
        }

        function mostrarEspecialidades(lista) {
            const tabla = document.getElementById('tablaEspecialidades');
            tabla.innerHTML = '';

            lista.forEach(especialidad => {
                tabla.innerHTML += `
            <tr>
                <td>${especialidad.id}</td>
                <td>${especialidad.nombre}</td>
                <td>${especialidad.descripcion}</td>
                <td>
                    <a href="especialidad-editar.html?id=${especialidad.id}" class="btn btn-warning btn-sm">Editar</a>
                    <button onclick="eliminarEspecialidad(${especialidad.id})" class="btn btn-danger btn-sm">Eliminar</button>
                </td>
            </tr>
        `;
            });
        }

        function eliminarEspecialidad(id) {
            if (!confirm('¿Seguro que deseas eliminar esta especialidad?')) return;

            fetch(`${API}/${id}`, {
                method: 'DELETE',
                headers: {
                    Authorization: `Bearer ${token}`
                }
            })
                .then(res => validarSesion(res))
                .then(() => {
                    mostrarAlerta('Especialidad eliminada correctamente', 'success');
                    cargarEspecialidades();
                })
                .catch(() => mostrarAlerta('Error al eliminar especialidad', 'danger'));
        }

        document.getElementById('buscador').addEventListener('input', e => {
            const texto = e.target.value.toLowerCase();

            const filtrados = especialidades.filter(especialidad =>
                especialidad.nombre.toLowerCase().includes(texto) ||
                especialidad.descripcion.toLowerCase().includes(texto)
            );

            mostrarEspecialidades(filtrados);
        });

        function validarSesion(res) {
            if (res.status === 401 || res.status === 403) {
                sessionStorage.clear();
                window.location.href = 'login.html';
                return;
            }
            return res.json();
        }

        function mostrarAlerta(mensaje, tipo) {
            document.getElementById('alerta').innerHTML = `
        <div class="alert alert-${tipo}">${mensaje}</div>
    `;
        }

        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        cargarEspecialidades();
    </script>

</body>

</html>
